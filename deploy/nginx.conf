# ─────────────────────────────────────────────────────────────────────────────
# Nginx site config for Codex
# Path on server:  /etc/nginx/sites-available/codex.conf
# Replace YOUR_DOMAIN.com with your real domain (e.g. codex-me.com).
#
# Architecture:
#   YOUR_DOMAIN.com           → public website
#   www.YOUR_DOMAIN.com       → public website
#   dashboard.YOUR_DOMAIN.com → admin dashboard only
# Both vhosts proxy to the same Next.js process; the app's middleware
# decides what each host is allowed to serve.
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zones
limit_req_zone $binary_remote_addr zone=codex_strict:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=codex_general:10m rate=120r/m;

upstream codex_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ─────────────────────────────────────────────────────────────────────────────
#  HTTP → HTTPS redirect (Certbot will populate the SSL block automatically)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com dashboard.YOUR_DOMAIN.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
#  PUBLIC SITE — YOUR_DOMAIN.com  &  www.YOUR_DOMAIN.com
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 4M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss text/xml image/svg+xml;

    location /_next/static/ {
        proxy_cache_valid 200 365d;
        proxy_pass http://codex_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /uploads/ {
        alias /home/deploy/codex-website/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /favicon.svg { proxy_pass http://codex_app; expires 7d; }
    location = /robots.txt  { proxy_pass http://codex_app; expires 1d; }
    location = /sitemap.xml { proxy_pass http://codex_app; expires 1d; }

    # Stricter rate-limit on the public contact endpoint
    location = /api/contact {
        limit_req zone=codex_strict burst=5 nodelay;
        proxy_pass http://codex_app;
        include /etc/nginx/proxy_params;
    }

    # ── Hard-block /admin and /api/admin on the public domain ────────────────
    # Defense-in-depth: the Next.js middleware also returns 404 for these,
    # but blocking at the edge avoids hitting the app entirely.
    location ^~ /admin       { return 404; }
    location ^~ /api/admin   { return 404; }

    location / {
        limit_req zone=codex_general burst=20 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_pass http://codex_app;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
#  ADMIN DASHBOARD — dashboard.YOUR_DOMAIN.com
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.YOUR_DOMAIN.com;

    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Stronger HSTS, no-index for the dashboard
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Bigger body for media uploads (videos up to 100MB)
    client_max_body_size 110M;
    client_body_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss text/xml image/svg+xml;

    # Static Next.js assets
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        proxy_pass http://codex_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Uploaded media (admin previews etc.)
    location /uploads/ {
        alias /home/deploy/codex-website/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /favicon.svg { proxy_pass http://codex_app; expires 7d; }

    # Rate-limit login + admin API (uploads, user CRUD, etc.)
    location = /admin/login {
        limit_req zone=codex_strict burst=5 nodelay;
        proxy_pass http://codex_app;
        include /etc/nginx/proxy_params;
    }
    location ^~ /api/admin/ {
        limit_req zone=codex_general burst=20 nodelay;
        proxy_pass http://codex_app;
        include /etc/nginx/proxy_params;
    }

    location / {
        limit_req zone=codex_general burst=20 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass http://codex_app;
    }
}
