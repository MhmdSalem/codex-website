# ─────────────────────────────────────────────────────────────────────────────
# Nginx site config for Codex
# Path on server:  /etc/nginx/sites-available/codex.conf
# Replace YOUR_DOMAIN.com with your real domain (e.g. codex-tech.com).
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limit zone for sensitive endpoints (login, contact, etc.)
limit_req_zone $binary_remote_addr zone=codex_strict:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=codex_general:10m rate=120r/m;

upstream codex_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → redirect to HTTPS (Certbot fills the SSL block automatically) ─────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # ACME challenge (Let's Encrypt) — leave this open
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # SSL certs (filled in by certbot --nginx)
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    # Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Body size for media uploads (videos up to 100MB)
    client_max_body_size 110M;
    client_body_timeout 120s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss text/xml image/svg+xml;

    # ── Static Next.js assets — long cache ──────────────────────────────────
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        proxy_pass http://codex_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── User-uploaded files — served directly by Nginx for speed ────────────
    location /uploads/ {
        alias /home/deploy/codex-website/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # ── Favicon / robots / sitemap ──────────────────────────────────────────
    location = /favicon.svg { proxy_pass http://codex_app; expires 7d; }
    location = /robots.txt  { proxy_pass http://codex_app; expires 1d; }
    location = /sitemap.xml { proxy_pass http://codex_app; expires 1d; }

    # ── Stricter rate-limit for the admin login & contact endpoint ──────────
    location = /admin/login {
        limit_req zone=codex_strict burst=5 nodelay;
        proxy_pass http://codex_app;
        include /etc/nginx/proxy_params;
    }
    location = /api/contact {
        limit_req zone=codex_strict burst=5 nodelay;
        proxy_pass http://codex_app;
        include /etc/nginx/proxy_params;
    }

    # ── Everything else → Next.js ───────────────────────────────────────────
    location / {
        limit_req zone=codex_general burst=20 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_pass http://codex_app;
    }
}
